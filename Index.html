
<!DOCTYPE html>
<html>
<head>
<title>Sameer Tools</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

textarea{
width:300px;
height:150px;
}

button{
padding:10px 20px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Word Counter Tool</h1>

<textarea id="text" placeholder="Paste text here"></textarea>

<br>

<button onclick="countWords()">Count Words</button>

<p id="result"></p>

<script>
function countWords(){
var text=document.getElementById("text").value;
var words=text.trim().split(/\s+/).length;
document.getElementById("result").innerHTML="Word Count: "+words;
}
</script>

</body>
</html>
